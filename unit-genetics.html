<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Pulse — Unit 2 Genetics</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Newsreader:ital@0;1&display=swap');

  /* ============================================================
     TOKENS — inherited from pulse_onboarding (visually native).
     Fonts: Fraunces (display) · Inter (body) · Newsreader (italic)
     ============================================================ */
  :root{
    --paper:#ffffff; --paper-card:#ffffff;
    --ink:#23291F; --ink-soft:#4c4d4a; --ink-faint:#7c8076;
    --line:#cfcabd; --line-soft:#EBE4D6;
    --clay:#1e4895; --clay-soft:#E4EAF5;     /* single accent */
    --moss:#5B7355; --moss-soft:#E0E8DB;     /* correct/done */
    --red:#A8443A; --red-soft:#F2DAD3;       /* wrong/triage */
    --r:16px; --r-sm:11px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;
    border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.86);
    backdrop-filter:blur(8px);z-index:20;}
  .logo{display:flex;align-items:center;gap:11px;}
  .logo .name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;letter-spacing:-.01em;color:var(--ink);}
  .logo .name .sub{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:1px;}

  /* DEV preview switch (hidden in production) */
  .preview{display:flex;align-items:center;gap:8px;}
  .preview .plab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);}
  .pathswitch{display:flex;gap:4px;background:#f4f2ec;border:1px solid var(--line);border-radius:999px;padding:3px;}
  .pathswitch button{font:inherit;font-size:12px;font-weight:600;border:none;background:none;color:var(--ink-faint);
    padding:6px 12px;border-radius:999px;cursor:pointer;transition:.15s;}
  .pathswitch button.on{background:var(--ink);color:#fff;}
  .pathswitch button:focus-visible{outline:2px solid var(--clay);outline-offset:1px;}

  .prog{display:flex;align-items:center;gap:7px;padding:18px 28px 0;justify-content:center;min-height:25px;}
  .prog i{height:7px;width:7px;border-radius:50%;background:var(--line);transition:.3s;}
  .prog i.on{background:var(--clay);width:22px;border-radius:4px;}
  .prog i.done{background:var(--moss);}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 24px 100px;}
  .screen{display:block;width:100%;max-width:640px;animation:rise .45s cubic-bezier(.2,.7,.2,1);}
  .screen.wide{max-width:920px;}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  /* ---- teach screen typography (roomier, bigger title) ---- */
  .unitline{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);text-align:center;margin-bottom:26px;}
  .concept-title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(30px,5vw,44px);line-height:1.08;
    letter-spacing:-.02em;text-align:center;color:var(--ink);}
  .lo{display:block;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:500;margin-top:18px;max-width:520px;margin-left:auto;margin-right:auto;}
  .teach-body{font-size:17px;color:var(--ink-soft);text-align:center;margin:38px auto 0;max-width:540px;line-height:1.75;}
  .teach-body b{color:var(--ink);font-weight:600;}

  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--clay);margin-bottom:18px;text-align:center;}
  h2{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,3.6vw,32px);line-height:1.14;letter-spacing:-.015em;text-align:center;}

  .stem{font-family:'Fraunces',serif;font-weight:600;font-size:22px;line-height:1.3;text-align:center;margin:6px auto 26px;max-width:560px;}
  .opts{display:flex;flex-direction:column;gap:11px;max-width:560px;margin:0 auto;}
  .opt{text-align:left;background:var(--paper-card);border:1.5px solid var(--line);border-radius:var(--r-sm);
    padding:16px 18px;font-size:15px;color:var(--ink);cursor:pointer;font-family:'Inter',sans-serif;
    transition:border-color .15s,background .15s,transform .1s;display:flex;align-items:center;gap:12px;}
  .opt:hover{border-color:var(--ink);transform:translateY(-1px);}
  .opt:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .opt .k{font-size:12px;font-weight:600;width:24px;height:24px;flex-shrink:0;border-radius:6px;background:var(--paper);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink-faint);}
  .opt.picked{border-color:var(--ink);}
  .opt.picked .k{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .opt.correct{border-color:var(--moss);background:var(--moss-soft);}
  .opt.correct .k{background:var(--moss);color:#fff;border-color:var(--moss);}
  .opt.wrong{border-color:var(--red);background:var(--red-soft);}
  .opt.wrong .k{background:var(--red);color:#fff;border-color:var(--red);}
  .opt[disabled]{cursor:default;}

  .btn{font-family:'Inter',sans-serif;font-weight:600;font-size:15px;background:var(--ink);color:var(--paper);
    border:none;border-radius:999px;padding:14px 32px;cursor:pointer;transition:transform .14s,background .2s,box-shadow .2s;

  .btn:hover{background:#15190f;transform:translateY(-1px);box-shadow:0 6px 20px rgba(35,41,31,.16);}
  .btn:active{transform:translateY(0);}
  .btn:focus-visible{outline:3px solid var(--clay);outline-offset:3px;}
  .btn[disabled]{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn.center{display:block;margin:44px auto 0;}
  .btn.ghost{background:none;color:var(--ink-faint);box-shadow:none;border:1px solid var(--line);}
  .btn.ghost:hover{background:#f6f4ee;color:var(--ink);box-shadow:none;}
  .actions{display:flex;gap:12px;justify-content:center;margin-top:34px;flex-wrap:wrap;}

  .reteach{max-width:560px;margin:0 auto;}

  .panel.miss p b{color:#511f19;}
  .panel.fix{background:#fff;border:1px solid var(--line);}
  .panel.fix .tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:7px;}
  .panel.fix p{font-size:15px;color:var(--ink-soft);line-height:1.6;}

  .mcard{background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;}

  .mhead:hover{background:#faf9f5;}

  .mcard .mt .mtitle{font-size:14px;font-weight:600;color:var(--ink);}

  .artthumb img{width:100%;display:block;aspect-ratio:16/10;object-fit:cover;object-position:top center;}
  .artthumb .ytopen{background:rgba(30,72,149,.86);}
  .panel.crux{background:var(--moss-soft);border:1px solid var(--moss);}
  .panel.crux .tag{color:var(--moss);}
  .panel.crux p{font-size:15px;color:#3f5439;line-height:1.55;}
  .panel.crux p b{color:#2c3d28;}

  .reveal{max-width:560px;margin:0 auto 4px;background:#f6f4ee;border:1px solid var(--line);border-radius:var(--r);padding:20px 24px;text-align:left;}
  .reveal .tag{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:8px;}
  .reveal p{font-size:15px;color:var(--ink-soft);line-height:1.55;}
  .reveal p b{color:var(--ink);}
  .reveal-hint{text-align:center;font-size:14px;color:var(--ink-soft);margin:18px 0 14px;}

  /* one-line reflect (now lives on the recap = after correct) */
  .reflect-one{max-width:560px;margin:18px auto 0;}
  .reflect-one label{display:block;font-size:14px;color:var(--ink-soft);margin-bottom:9px;text-align:center;}
  .reflect-one input{width:100%;font:inherit;font-size:15px;padding:13px 15px;border:1.5px solid var(--line);
    border-radius:var(--r-sm);background:#fff;color:var(--ink);outline:none;}
  .reflect-one input:focus{border-color:var(--clay);}

  .reflect-big{max-width:560px;margin:24px auto 0;}
  .reflect-big textarea{width:100%;font:inherit;font-size:15px;padding:14px 16px;border:1.5px solid var(--line);
    border-radius:var(--r-sm);background:#fff;color:var(--ink);outline:none;resize:vertical;min-height:96px;line-height:1.5;}
  .reflect-big textarea:focus{border-color:var(--clay);}
  .conf{max-width:560px;margin:26px auto 0;text-align:center;}
  .conf .clab{font-size:14px;color:var(--ink-soft);margin-bottom:14px;}
  .conf .dots{display:flex;gap:10px;justify-content:center;}
  .conf .cd{width:46px;height:46px;border-radius:50%;border:1.5px solid var(--line);background:#fff;cursor:pointer;
    font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--ink-faint);transition:.15s;}
  .conf .cd:hover{border-color:var(--ink);color:var(--ink);}
  .conf .cd.on{background:var(--clay);border-color:var(--clay);color:#fff;}
  .conf .cd:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .conf .cscale{display:flex;justify-content:space-between;max-width:300px;margin:9px auto 0;font-size:11px;color:var(--ink-faint);}

  .done .big{font-family:'Fraunces',serif;font-weight:600;font-size:36px;text-align:center;margin-bottom:8px;}
  .done .sub{text-align:center;color:var(--ink-soft);font-size:15px;max-width:480px;margin:0 auto;}
  .done-stats{display:flex;gap:14px;justify-content:center;margin:30px 0 0;flex-wrap:wrap;}
  .ds{background:#f6f4ee;border:1px solid var(--line);border-radius:var(--r);padding:16px 22px;text-align:center;min-width:120px;}
  .ds .n{font-family:'Fraunces',serif;font-weight:600;font-size:26px;color:var(--ink);}
  .ds .l{font-size:12px;color:var(--ink-faint);margin-top:3px;}

  /* ---- materials (syllabus browse before the unit) ---- */
  .mat-tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:22px 0 16px;}
  .mat-tabs button{font:inherit;font-size:13px;font-weight:600;border:1.5px solid var(--line);background:#fff;
    color:var(--ink-soft);padding:9px 16px;border-radius:999px;cursor:pointer;transition:.15s;}
  .mat-tabs button:hover{border-color:var(--ink);color:var(--ink);}
  .mat-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .mat-viewer{width:100%;height:64vh;border:1px solid var(--line);border-radius:var(--r);background:#f3f1ea;overflow:auto;padding:14px;}
  .mat-viewer canvas{display:block;margin:0 auto 14px;max-width:100%;box-shadow:0 1px 6px rgba(0,0,0,.12);background:#fff;border-radius:4px;}
  .mat-loading{color:var(--ink-faint);font-size:13px;text-align:center;padding:40px 20px;line-height:1.6;}
  .mat-note{text-align:center;font-size:12px;color:var(--ink-faint);margin-top:12px;}
</style>

<script>
/* ============================================================
   PULSE — Unit 2 (Genetics & Molecular Biology)
   ------------------------------------------------------------
   DEV_PREVIEW = true  -> shows the path switcher (designer only)
   DEV_PREVIEW = false -> hides it; path comes from ?path=  (onboarding handoff)

   ONE content set drives all three paths via concept `tier`:
       triage  subset of  standard  subset of  advanced
   All questions are ORIGINAL mock items mapped to the real
   BIOL101 Lesson 1-8 objectives (no exam content). Misconceptions
   are documented open-source bio-ed classics.

   >>> MEDIA: video = inline embed (paste YouTube IDs in `video.id`).
       article = OpenStax Biology 2e (CC BY) inline preview + link.
       Swap any URL/ID to taste. <<<
   ============================================================ */
const DEV_PREVIEW = true;

const OS  = 'https://openstax.org/books/biology-2e/pages/';   // OpenStax base (CC BY)

/* helper: a video object. id:'' -> inline placeholder you fill later */
function vid(id, title){ return {id, title, src:'Amoeba Sisters · YouTube'}; }
function art(slug, title, preview){ return {url:OS+slug, title, src:'OpenStax Biology 2e · CC BY', preview}; }

const MODULE = {
  unit:`Unit 2 · Genetics & Molecular Biology`,
  concepts:[
    /* ---- MITOSIS & CANCER (standard) ---- */
    {
      id:`mitosis`, tier:`standard`, label:`Mitosis & cancer`,
      lo:`Lesson 9 — mitosis, cell division, and how cancer arises`,
      teach:`Mitosis makes two genetically <b>identical</b> body cells — that's how you grow and heal. <b>Cancer</b> is what happens when your own cells escape the controls on division and keep multiplying.`,
      reflect:`In one line: what are cancer cells, really?`,
      check:{
        stem:`What best describes cancer cells?`,
        options:[
          {t:`Foreign invaders that enter the body from outside`, correct:false,
           mc:`"Cancer cells are foreign invaders"`,
           fix:`Cancer isn't an outside invader. Cancer cells are your <b>own</b> body cells that have lost the controls on mitosis and divide uncontrollably — which is also why cancer isn't contagious like a cold.`,
           video:vid(`f-ldPgEfAHI`,`Mitosis`), article:art(`10-introduction`,`Ch. 10 Cell Reproduction`,`OpenStax §10 — the cell cycle, mitosis, and how loss of division control leads to cancer.`)},
          {t:`Your own cells that divide uncontrollably after losing normal controls`, correct:true},
          {t:`Cells that have permanently stopped dividing`, correct:false,
           mc:`"Cancer is cells that stopped dividing"`,
           fix:`It's the opposite — cancer cells divide <b>too much</b>, not too little. Normal cells stop dividing when they should; cancer cells ignore that stop signal.`,
           video:vid(`f-ldPgEfAHI`,`Mitosis`), article:art(`10-introduction`,`Ch. 10 Cell Reproduction`,`OpenStax §10 — normal cell-cycle checkpoints and what happens when they fail.`)},
        ],
        reask:{stem:`Why isn't cancer contagious the way the flu is?`, options:[
          {t:`Because cancer cells are your own cells, not an outside germ`, correct:true},
          {t:`Because cancer cells die instantly outside the body`, correct:false},
          {t:`Because the immune system blocks all transfer`, correct:false}]}
      },
      recap:`Mitosis makes identical body cells for growth and repair. Cancer = your <b>own</b> cells dividing out of control after losing the brakes — not an invader, not contagious.`
    },

    /* ---- MEIOSIS & CHROMOSOME NUMBER (triage) ---- */
    {
      id:`meiosis`, tier:`triage`, label:`Meiosis & chromosome number`,
      lo:`Lesson 10 — meiosis, haploid vs diploid, chromosome number`,
      teach:`Meiosis makes <b>gametes</b> (sperm and eggs) and <b>halves</b> the chromosome number. Human body cells have 46 chromosomes; gametes have 23. Fertilization adds them back to 46.`,
      reflect:`In one line: how many chromosomes does a human gamete have, and why?`,
      check:{
        stem:`Human body cells have 46 chromosomes. How many are in a single sperm or egg?`,
        options:[
          {t:`46 — the same as body cells`, correct:false,
           mc:`"Gametes have the same chromosome number as body cells"`,
           fix:`If gametes kept all 46, fertilization would make 92, then 184… The whole point of meiosis is to <b>halve</b> the number to 23, so that sperm (23) + egg (23) = 46 in the new individual.`,
           video:vid(`VzDMG7ke69g`,`Meiosis`), article:art(`11-introduction`,`Ch. 11 Meiosis & Sexual Reproduction`,`OpenStax §11 — how meiosis reduces diploid cells to haploid gametes.`)},
          {t:`23 — half of the body-cell number`, correct:true},
          {t:`92 — double, ready to split`, correct:false,
           mc:`"Meiosis doubles the chromosomes"`,
           fix:`DNA does copy once before division, but meiosis then divides <b>twice</b>, ending with <b>half</b> the original number (23) — not double.`,
           video:vid(`VzDMG7ke69g`,`Meiosis`), article:art(`11-introduction`,`Ch. 11 Meiosis & Sexual Reproduction`,`OpenStax §11 — one round of DNA copying, two divisions, half the chromosomes.`)},
        ],
        reask:{stem:`A fruit fly has 8 chromosomes in its body cells. How many are in each gamete after meiosis?`, options:[
          {t:`4`, correct:true},
          {t:`8`, correct:false},
          {t:`16`, correct:false}]}
      },
      recap:`Meiosis halves the chromosome number to make gametes (human: 46 → 23). Fertilization restores the full number — so you're not doubling chromosomes every generation.`
    },

    /* ---- DOMINANT vs RECESSIVE (triage) — the showcase ---- */
    {
      id:`dominant`, tier:`triage`, label:`Dominant vs recessive`,
      lo:`Lesson 11/12 — dominant vs recessive alleles; how traits are expressed`,
      teach:`"Dominant" and "recessive" describe <b>which allele's trait shows</b> when the two alleles differ. Dominant does <b>not</b> mean stronger, better, or more common — just which one you see.`,
      reflect:`In one line: what does "dominant" actually describe?`,
      check:{
        stem:`What does it mean for an allele to be "dominant"?`,
        options:[
          {t:`It's the most common allele in the population`, correct:false,
           mc:`"Dominant means most common"`,
           fix:`Frequency and dominance are unrelated. A dominant allele can be <b>rare</b> and a recessive allele can be common — dominance is only about which trait shows when both are present, not how often the allele appears.`,
           video:vid(`pv3Kj0UjiLE`,`Alleles and Genes`), article:art(`12-introduction`,`Ch. 12 Mendel's Experiments & Heredity`,`OpenStax §12 — dominant vs recessive describes expression, not frequency.`)},

/* render a PDF inline to canvases (immune to the browser's "download PDFs" setting) */
async function renderPdfInto(url, host){
  host.innerHTML = '<div class="mat-loading">Loading preview…</div>';
  if(!window.pdfjsLib){
    host.innerHTML = '<div class="mat-loading">The PDF viewer didn\'t load (check your connection). The link below still opens the file.</div>';
    return;
  }
  try{
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await window.pdfjsLib.getDocument(url).promise;
    host.innerHTML = '';
    for(let n=1; n<=pdf.numPages; n++){
      const page = await pdf.getPage(n);
      const base = page.getViewport({scale:1});
      const scale = Math.min(2, (host.clientWidth - 28) / base.width);
      const vp = page.getViewport({scale});
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      host.appendChild(canvas);
      await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
    }
  }catch(e){
    host.innerHTML = '<div class="mat-loading">Couldn\'t render inline here. If you opened the file directly (file://), use VS Code Live Server or push to GitHub Pages. The link below opens the PDF either way.</div>';
  }
}

/* ---- CHECK ----
   Same flow for EVERY question:
     wrong #1  -> reteach (misconception-specific video + open-source article)
     wrong #2  -> reteach again (same resources, "let's look once more")
     wrong #3+ -> no material; re-ask and keep trying until correct
   correct at any point -> recap. */
function renderCheck(isReask, hint){
  const c = stops[pos];
  const q = isReask ? c.check.reask : c.check;
  show(`
    <div class="eyebrow">${c.label}${isReask?' &middot; try again':''}</div>
    ${hint?`<p class="reveal-hint">${hint}</p>`:''}
    <p class="stem">${q.stem}</p>
    <div class="opts" id="opts">
      ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`).join('')}
    </div>
  `);
  document.querySelectorAll('#opts .opt').forEach(b=>{
    b.onclick = ()=>{
      const i=+b.dataset.i, opt=q.options[i];
      document.querySelectorAll('#opts .opt').forEach(x=>x.disabled=true);
      b.classList.add(opt.correct?'correct':'wrong');
      if(opt.correct){
        if(attempts===0 && !isReask) stats.firstTry++;
        setTimeout(renderRecap, 480);
        return;
      }
      attempts++;
      if(!isReask) lastWrong = opt;                 // first question carries the misconception media
      const reOpt = (!isReask) ? opt : (lastWrong || opt);
      if(attempts <= 2){
        stats.reteaches++;
        setTimeout(()=>renderReteach(reOpt, attempts), 520);
      } else {
        setTimeout(()=>renderCheck(true, "Not quite — give it another go. You've got this."), 650);
      }
    };
  });
}

/* ---- RETEACH (misconception-specific; inline media; no reflect) ---- */
function mediaHTML(opt){
  // video -> thumbnail that opens YouTube in a new tab (no embed, so never Error 153)
  let v;
  if(opt.video && opt.video.id){
    const id = opt.video.id;
    v = `<a class="ytthumb" href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener">
        <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="${opt.video.title}" loading="lazy">
        <span class="ytplay"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#fff"/></svg></span>
        <span class="ytopen">Watch on YouTube &#8599;</span>
      </a>`;
  } else {
    v = `<div class="ytplaceholder">Paste a YouTube ID into <code>video.id</code> to show the video here.</div>`;
  }
  const vcard = `
    <div class="mcard vid open">
      <div class="mhead" data-toggle><span class="ic"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M5 3.5v9l7-4.5z" fill="#A8443A"/></svg></span>
        <span class="mt"><span class="mtitle">${opt.video?opt.video.title:'Video'}</span></span>
        <span class="chev">&#9660;</span></div>
      <div class="mbody">${v}</div>
    </div>`;
  const a = opt.article;
  const acard = a ? `
    <div class="mcard art open">
      <div class="mhead" data-toggle><span class="ic"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3.5" y="2.5" width="9" height="11" rx="1.4" stroke="#1e4895" stroke-width="1.4"/><path d="M5.5 6h5M5.5 8.3h5M5.5 10.6h3" stroke="#1e4895" stroke-width="1.2" stroke-linecap="round"/></svg></span>
        <span class="mt"><span class="mtitle">${a.title}</span></span>
        <span class="chev">&#9660;</span></div>
      <div class="mbody">
        <a class="artthumb" href="${a.url}" target="_blank" rel="noopener">
          <img src="https://s.wordpress.com/mshots/v1/${encodeURIComponent(a.url)}?w=640" alt="${a.title} preview" loading="lazy">
          <span class="ytopen">Open on OpenStax &#8599;</span>
        </a>
      </div>
    </div>` : '';
  return `<div class="media">${vcard}${acard}</div>`;
}
function renderReteach(opt, attemptNo){
  const c = stops[pos];
  const second = attemptNo >= 2;
  const head = second ? "let's look once more" : "let's untangle that";
  const cruxPanel = second
    ? `<div class="panel crux"><div class="tag">If the video didn't click, remember this</div><p>${c.recap}</p></div>`
    : '';
  show(`
    <div class="eyebrow">${c.label} &middot; ${head}</div>
    <div class="reteach">
      <div class="panel miss"><div class="tag">Common idea</div><p><b>${opt.mc}</b></p></div>
      ${cruxPanel}
      <div class="panel fix"><div class="tag">The fix</div><p>${opt.fix}</p></div>
      ${mediaHTML(opt)}
      <div class="actions"><button class="btn" id="retry">Try again &rarr;</button></div>
    </div>
  `);
  document.querySelectorAll('[data-toggle]').forEach(h=>{
    h.onclick = ()=>h.parentElement.classList.toggle('open');
  });
  document.getElementById('retry').onclick = ()=>{ renderCheck(true); };   // keep attempts; don't reset
}

        }).join('')}
        <div class="note-row"><span class="note-label">Final reflection</span><span class="note-val ${finalReflection?'':'none'}">${finalReflection?esc(finalReflection):'none'}</span></div>
      </div>
      <div class="actions">
        <button class="btn ghost" id="restart">Replay this unit</button>
        <button class="btn" id="nextunit">Next unit &rarr;</button>
      </div>
    </div>
  `, {prog:false});
  document.getElementById('restart').onclick = startPath;
  document.getElementById('nextunit').onclick = ()=>{
    const cur = (location.pathname.split('/').pop()||'').replace(/\.html$/,'');
    const idx = unitOrder.indexOf(cur);
    if(idx >= 0 && idx < unitOrder.length-1){
      location.href = unitOrder[idx+1] + '.html#' + PATH + '|' + unitOrder.join(',');
    } else {
      alert(unitOrder.length ? 'That was the last unit in your plan 🎉' : 'Next unit isn\'t wired yet — pass an ordered plan from onboarding.');
    }
  };
}

/* ---- path control ---- */
function startPath(){
  pos=0; attempts=0; conf=0; stats={firstTry:0, reteaches:0}; notes={}; finalReflection='';
  buildStops();
  renderMaterials();
}
document.querySelectorAll('#pathswitch button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('#pathswitch button').forEach(x=>x.classList.toggle('on', x===b));
    PATH=b.dataset.p; startPath();
  };
});

/* init */
buildStops();
// reflect incoming ?path in the switcher
document.querySelectorAll('#pathswitch button').forEach(b=>b.classList.toggle('on', b.dataset.p===PATH));
startPath();
</script>
</body>

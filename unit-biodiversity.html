<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Newsreader:ital@0;1&display=swap');

  /* ============================================================
     TOKENS — inherited from pulse_onboarding (visually native).
     Fonts: Fraunces (display) · Inter (body) · Newsreader (italic)
     ============================================================ */
  :root{
    --paper:#ffffff; --paper-card:#ffffff;
    --ink:#23291F; --ink-soft:#4c4d4a; --ink-faint:#7c8076;
    --line:#cfcabd; --line-soft:#EBE4D6;
    --clay:#1e4895; --clay-soft:#E4EAF5;     /* single accent */

  }
  *{box-sizing:border-box;margin:0;padding:0;}

  body{font-family:'Inter',-apple-system,sans-serif;background:var(--paper);color:var(--ink);

  .logo .name{font-family:'Fraunces',serif;font-weight:600;font-size:17px;letter-spacing:-.01em;color:var(--ink);}
  .logo .name .sub{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:10px;

  /* DEV preview switch (hidden in production) */

  .preview .plab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);}

    padding:6px 12px;border-radius:999px;cursor:pointer;transition:.15s;}
  .pathswitch button.on{background:var(--ink);color:#fff;}

  .conf{max-width:560px;margin:26px auto 0;text-align:center;}
  .conf .clab{font-size:14px;color:var(--ink-soft);margin-bottom:14px;}

  .conf .cd:hover{border-color:var(--ink);color:var(--ink);}
  .conf .cd.on{background:var(--clay);border-color:var(--clay);color:#fff;}
  .conf .cd:focus-visible{outline:3px solid var(--clay);outline-offset:2px;}
  .conf .cscale{display:flex;justify-content:space-between;max-width:300px;margin:9px auto 0;font-size:11px;color:var(--ink-faint);}

  .done .big{font-family:'Fraunces',serif;font-weight:600;font-size:36px;text-align:center;margin-bottom:8px;}
  .done .sub{text-align:center;color:var(--ink-soft);font-size:15px;max-width:480px;margin:0 auto;}

  /* ---- materials (syllabus browse before the unit) ---- */

<script>
/* ============================================================
   PULSE — Unit 4 (Biodiversity & Evolution)
   ------------------------------------------------------------
   DEV_PREVIEW = true  -> shows the path switcher (designer only)
   DEV_PREVIEW = false -> hides it; path comes from ?path=  (onboarding handoff)

   ONE content set drives all three paths via concept `tier`:
       triage  subset of  standard  subset of  advanced
   All questions are ORIGINAL mock items mapped to the real
   BIOL101 Lesson 1-8 objectives (no exam content). Misconceptions
   are documented open-source bio-ed classics.

   >>> MEDIA: video = inline embed (paste YouTube IDs in `video.id`).
       article = OpenStax Biology 2e (CC BY) inline preview + link.
       Swap any URL/ID to taste. <<<
   ============================================================ */
const DEV_PREVIEW = true;

const OS  = 'https://openstax.org/books/biology-2e/pages/';   // OpenStax base (CC BY)

/* helper: a video object. id:'' -> inline placeholder you fill later */
function vid(id, title){ return {id, title, src:'Amoeba Sisters · YouTube'}; }
function art(slug, title, preview){ return {url:OS+slug, title, src:'OpenStax Biology 2e · CC BY', preview}; }

const MODULE = {
  unit:`Unit 4 · Biodiversity`,
  concepts:[
    /* ---- NATURAL SELECTION (triage) — the showcase ---- */
    {
      id:`natural-selection`, tier:`triage`, label:`Natural selection`,
      lo:`Lesson 22 — natural selection as a mechanism of evolution`,
      teach:`Natural selection works like this: individuals in a population already <b>vary</b> (from inherited alleles). Those whose traits fit the environment survive and reproduce more, so those traits become more common over generations. Individuals don't change to fit — the population's mix shifts.`,
      reflect:`In one line: does an individual evolve during its lifetime?`,
      check:{
        stem:`How does natural selection work?`,
        options:[
          {t:`Individuals change their traits during life to fit the environment`, correct:false,
           mc:`"Individuals evolve during their lifetime"`,
           fix:`Individuals don't remake themselves to fit. The variation already exists in the population (from inherited alleles). Those with helpful variants reproduce more, so the trait becomes more common over <b>generations</b> — the population changes, not the individual.`,
           video:vid(`7VM9YxmULuo`,`Natural Selection`), article:art(`18-introduction`,`Ch. 18 Evolution & the Origin of Species`,`OpenStax §18 — natural selection acts on existing heritable variation across generations.`)},
          {t:`Individuals that already vary reproduce at different rates, shifting the population over generations`, correct:true},
          {t:`Organisms evolve the traits they need because they need them`, correct:false,
           mc:`"Organisms evolve because they need to"`,
           fix:`Selection isn't goal-directed. Nothing decides to grow a helpful trait. Random variation exists first; the environment simply favors whoever already happens to have useful variants. No wanting, no trying.`,
           video:vid(`7VM9YxmULuo`,`Natural Selection`), article:art(`18-introduction`,`Ch. 18 Evolution & the Origin of Species`,`OpenStax §18 — selection is not purposeful; it favors pre-existing variants.`)},
        ],
        reask:{stem:`A population of beetles lives on dark bark. Over generations, dark beetles become more common. Why?`, options:[
          {t:`Dark beetles were already present and survived predators better, so they left more offspring`, correct:true},
          {t:`Light beetles turned dark to blend in`, correct:false},
          {t:`The beetles chose to become dark`, correct:false}]}
      },
      recap:`Natural selection: variation already exists; the environment favors some variants; those reproduce more, so the <b>population</b> shifts over generations. Individuals don't evolve, and it isn't goal-directed.`
    },

    /* ---- WHAT "FITTEST" MEANS (triage) ---- */
    {
      id:`fitness`, tier:`triage`, label:`What "fittest" means`,
      lo:`Lesson 22 — biological fitness`,
      teach:`In biology, "fitness" means <b>reproductive success</b> — how many surviving offspring you leave — in a particular environment. It does <b>not</b> mean strongest, fastest, or healthiest.`,
      reflect:`In one line: what does "fittest" mean in biology?`,
      check:{
        stem:`"Survival of the fittest" — what does "fittest" mean in biology?`,
        options:[
          {t:`The strongest or fastest individual`, correct:false,
           mc:`"Fittest means strongest"`,
           fix:`Fitness isn't about muscle or speed. In biology the "fittest" is whoever leaves the most surviving offspring in that environment — which might be the smallest, dullest, or best-camouflaged, not the strongest.`,
           video:vid(`7VM9YxmULuo`,`Natural Selection`), article:art(`18-introduction`,`Ch. 18 Evolution & the Origin of Species`,`OpenStax §18 — fitness is measured by reproductive success, not strength.`)},
          {t:`The one that leaves the most surviving offspring in its environment`, correct:true},
          {t:`The one that lives the longest`, correct:false,
           mc:`"Fittest means longest-lived"`,
           fix:`Living long only matters if it leads to more offspring. An organism that lives briefly but reproduces a lot can be "fitter" than one that lives long but barely reproduces.`,
           video:vid(`7VM9YxmULuo`,`Natural Selection`), article:art(`18-introduction`,`Ch. 18 Evolution & the Origin of Species`,`OpenStax §18 — fitness reflects surviving offspring, not lifespan.`)},
        ],
        reask:{stem:`In a snowy habitat, a well-camouflaged but weak hare out-reproduces a strong but visible one. Which is "fitter"?`, options:[
          {t:`The camouflaged hare — it leaves more surviving offspring`, correct:true},
          {t:`The strong hare — it's physically tougher`, correct:false},
          {t:`Neither — fitness is only about strength`, correct:false}]}
      },
      recap:`Biological fitness = reproductive success in a given environment — not strength, speed, or lifespan. The "fittest" is simply whoever leaves the most surviving offspring.`
    },

    /* ---- SPECIES & SPECIATION (triage) ---- */
    {
      id:`speciation`, tier:`triage`, label:`Species & speciation`,
      lo:`Lesson 18/24 — the biological species concept and how species form`,
      teach:`Under the biological species concept, a <b>species</b> is a group that can interbreed and produce <b>fertile</b> offspring. New species form when populations become reproductively <b>isolated</b> — they can no longer interbreed.`,
      reflect:`In one line: what actually makes two populations different species?`,
      check:{
        stem:`What makes two populations count as different species?`,
        options:[
          {t:`They simply look noticeably different`, correct:false,
           mc:`"Different-looking means different species"`,
           fix:`Appearance can mislead. Great Danes and Chihuahuas look wildly different but are the same species (they can interbreed). What defines a species is whether they can interbreed and produce fertile offspring — not how they look.`,
           video:vid(`udZUaNKXbJA`,`Speciation`), article:art(`18-introduction`,`Ch. 18 Evolution & the Origin of Species`,`OpenStax §18 — the biological species concept is based on interbreeding, not appearance.`)},
          {t:`They can no longer interbreed to produce fertile offspring`, correct:true},
          {t:`They live in different places`, correct:false,
           mc:`"Living apart means different species"`,
           fix:`Living in separate places can START speciation, but it doesn't by itself make two species. They become separate species only once they can no longer successfully interbreed.`,
           video:vid(`udZUaNKXbJA`,`Speciation`), article:art(`18-introduction`,`Ch. 18 Evolution & the Origin of Species`,`OpenStax §18 — geographic separation can lead to, but does not equal, speciation.`)},
        ],
        reask:{stem:`Two bird populations were separated by a canyon for a long time. They count as a new species when…`, options:[
          {t:`They can no longer interbreed to produce fertile offspring`, correct:true},
          {t:`Their feathers are a slightly different color`, correct:false},
          {t:`They simply live on opposite sides`, correct:false}]}
      },
      recap:`A species = a group that can interbreed and make fertile offspring. Speciation happens when populations become reproductively isolated — appearance and location alone don't define a species.`
    },

    /* ---- COMMUNITY INTERACTIONS (standard) ---- */
    {
      id:`community`, tier:`standard`, label:`Community interactions`,
      lo:`Lesson 20 — types of community interactions`,
      teach:`Species interact in many ways — not just fighting. Alongside predation and competition there's <b>symbiosis</b>: mutualism (both benefit), commensalism (one benefits, other unaffected), and parasitism.`,
      reflect:`In one line: are all species interactions harmful competition?`,
      check:{
        stem:`Which best describes how species in a community interact?`,
        options:[
          {t:`Every interaction is competition or predation`, correct:false,
           mc:`"All species interactions are competition/predation"`,
           fix:`Not all interactions are a fight. Many are cooperative: in mutualism <b>both</b> species benefit (like bees and flowers), and in commensalism one benefits while the other is unaffected. Competition and predation are only part of the picture.`,
           video:vid(`rNjPI84sApQ`,`Ecological Relationships`), article:art(`45-introduction`,`Ch. 45 Population & Community Ecology`,`OpenStax §45 — community interactions include competition, predation, and symbiosis.`)},
          {t:`Interactions range from competition and predation to mutualism and commensalism`, correct:true},
          {t:`Species in a community don't really affect each other`, correct:false,
           mc:`"Species in a community are independent"`,
           fix:`Community members are highly interdependent — food, shelter, pollination, and disease all link them. Removing one species often ripples through the whole community.`,
           video:vid(`rNjPI84sApQ`,`Ecological Relationships`), article:art(`45-introduction`,`Ch. 45 Population & Community Ecology`,`OpenStax §45 — species in a community are interdependent.`)},
        ],
        reask:{stem:`Bees pollinate a flower and get nectar; both benefit. This interaction is…`, options:[
          {t:`Mutualism`, correct:true},
          {t:`Predation`, correct:false},
          {t:`Competition`, correct:false}]}
      },
      recap:`Community interactions include competition and predation but ALSO mutualism (both benefit) and commensalism. Not every relationship is a fight, and species are highly interdependent.`
    },

    /* ---- THE MICROBIOME (standard) ---- */
    {
      id:`microbiome`, tier:`standard`, label:`The microbiome`,
      lo:`Lesson 21 — the microbiome; most bacteria are not harmful`,
      teach:`Most bacteria are <b>not</b> harmful. Your gut hosts trillions of microbes — your <b>microbiome</b> — that help you digest food, make certain vitamins, and train your immune system. Only a small fraction of bacteria cause disease.`,
      reflect:`In one line: are most bacteria harmful?`,
      check:{
        stem:`Which statement about bacteria is correct?`,
        options:[
          {t:`Bacteria are germs — nearly all of them make you sick`, correct:false,
           mc:`"All bacteria are harmful germs"`,
           fix:`Only a small minority of bacteria cause disease. Most are harmless or actively helpful — your gut microbiome aids digestion, makes vitamins, and helps train your immune system. Wiping out all bacteria would harm you.`,
           video:vid(`ORB866QSGv8`,`Bacteria (Updated)`), article:art(`22-introduction`,`Ch. 22 Prokaryotes: Bacteria & Archaea`,`OpenStax §22 — most bacteria are harmless or beneficial; few are pathogens.`)},
          {t:`Most bacteria are harmless or helpful; only a few cause disease`, correct:true},
          {t:`The body would be healthier with no bacteria at all`, correct:false,
           mc:`"A body with no bacteria would be healthier"`,
           fix:`The opposite — you depend on your microbiome. Germ-free bodies have weaker digestion and immune development. Your resident bacteria are part of how you stay healthy.`,
           video:vid(`ORB866QSGv8`,`Bacteria (Updated)`), article:art(`22-introduction`,`Ch. 22 Prokaryotes: Bacteria & Archaea`,`OpenStax §22 — the human microbiome supports digestion and immunity.`)},
        ],
        reask:{stem:`Your gut microbiome helps you by…`, options:[
          {t:`Aiding digestion, making some vitamins, and training your immune system`, correct:true},
          {t:`Doing nothing useful; it's just along for the ride`, correct:false},
          {t:`Constantly making you sick`, correct:false}]}
      },
      recap:`Most bacteria are harmless or helpful. Your gut microbiome aids digestion, makes vitamins, and trains immunity — only a small fraction of bacteria cause disease.`
    },
  ],

  /* ---- SYNTHESIS / TRANSFER (advanced only) ---- */
  transfer:{
    id:`transfer`, tier:`advanced`, label:`Putting it together`,
    lo:`Lessons 22–23 — evolution is change in a population over generations`,
    teach:`Evolution is a change in the genetic makeup of a <b>population</b> across generations — measured as shifting <b>allele frequencies</b>. A single individual can't evolve; only a population can, over time.`,
    reflect:`In one line: what level does evolution happen at — the individual or the population?`,
    check:{
      stem:`At what level does evolution actually happen?`,
      options:[
        {t:`In an individual, over its own lifetime`, correct:false,
         mc:`"An individual evolves"`,
         fix:`Evolution is a <b>population-level</b> change across generations — the proportions of alleles shift. One organism's traits are fixed by its genes; it can't evolve. The population it belongs to can, over many generations.`,
         video:vid(`fI7IV3x-dGI`,`Evolution`), article:art(`19-introduction`,`Ch. 19 The Evolution of Populations`,`OpenStax §19 — evolution is measured as changes in allele frequencies in a population.`)},
        {t:`In a population, as allele frequencies shift across generations`, correct:true},
        {t:`In the environment, which changes to match organisms`, correct:false,
         mc:`"The environment evolves to match organisms"`,
         fix:`The environment isn't evolving to fit life; it just sets the conditions. Populations change (evolve) in response to those conditions — organisms adapt to the environment, not the reverse.`,
         video:vid(`fI7IV3x-dGI`,`Evolution`), article:art(`19-introduction`,`Ch. 19 The Evolution of Populations`,`OpenStax §19 — populations adapt to environments over generations.`)},
      ],
      reask:{stem:`Over 50 generations, a population's "dark fur" allele went from 10% to 70%. This is…`, options:[
        {t:`Evolution — the population's allele frequencies changed over generations`, correct:true},
        {t:`One animal slowly turning darker`, correct:false},
        {t:`Not evolution, since no new species formed`, correct:false}]}

  materials:[

/* ============================================================
   ENGINE
   ============================================================ */
const TIER_RANK = {triage:1, standard:2, advanced:3};
const tr = x => TIER_RANK[String(x).toLowerCase()];

let PATH = 'Advanced';
let unitOrder = [];   // ordered unit file basenames from onboarding (weakest first)
(function(){
  const q = new URLSearchParams(location.search).get('path');         // ?path=Advanced (http)
  const h = (location.hash || '').replace(/^#/,'').replace(/^path=/,''); // #Advanced|unit-a,unit-b,... (works on file://)
  const raw = q || h;
  if(raw){
    const parts = raw.split('|');
    if(parts[0]){ const p = parts[0].toLowerCase(); PATH = p.charAt(0).toUpperCase() + p.slice(1); }
    if(parts[1]){ unitOrder = parts[1].split(',').filter(Boolean); }
  }
})();

let stops = [], pos = 0, attempts = 0, conf = 0, lastWrong = null, notes = {}, finalReflection = '';
const esc = s => String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
let stats = {firstTry:0, reteaches:0};
const main = document.getElementById('main');

if(!DEV_PREVIEW){ document.getElementById('preview').style.display = 'none'; }

function buildStops(){
  const rank = tr(PATH);
  stops = MODULE.concepts.filter(c=>tr(c.tier) <= rank);
  if(tr(MODULE.transfer.tier) <= rank) stops.push(MODULE.transfer);
}
function renderProg(active){
  const p = document.getElementById('prog');
  if(active===false){ p.innerHTML=''; return; }
  p.innerHTML = stops.map((_,i)=>`<i class="${i<pos?'done':(i===pos?'on':'')}"></i>`).join('');
}
function show(html, opts){
  opts = opts || {};
  main.innerHTML = `<section class="screen ${opts.wide?'wide':''}">${html}</section>`;
  window.scrollTo({top:0,behavior:'smooth'});
  renderProg(opts.prog);
}

/* ---- MATERIALS (syllabus browse, shown once before the unit) ---- */
function renderMaterials(){
  const tabs = MODULE.materials.map((m,i)=>`<button data-i="${i}" class="${i===0?'on':''}">${m.label}</button>`).join('');
  show(`
    <div class="unitline">${MODULE.unit}</div>
    <h2>Before you start</h2>
    <p class="teach-body" style="margin-top:18px;">Skim the course materials — the schedule and learning objectives are what this review is built from.</p>
    <div class="mat-tabs" id="mattabs">${tabs}</div>
    <div class="mat-viewer" id="matframe"></div>
    <p class="mat-note">Not loading? <a id="matopen" href="${MODULE.materials[0].src}" target="_blank" rel="noopener">open this PDF in a new tab &#8599;</a> &middot; rendered inline — view over Live Server or GitHub Pages (not a file:// path).</p>
    <button class="btn center" id="startunit">Start Unit 4 &rarr;</button>
  `, {prog:false, wide:true});
  const host = document.getElementById('matframe');
  renderPdfInto(MODULE.materials[0].src, host);
  document.querySelectorAll('#mattabs button').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('#mattabs button').forEach(x=>x.classList.toggle('on', x===b));
      const src = MODULE.materials[+b.dataset.i].src;
      renderPdfInto(src, host);
      document.getElementById('matopen').href = src;
    };
  });
  document.getElementById('startunit').onclick = ()=>{ pos=0; renderTeach(); };
}

/* render a PDF inline to canvases (immune to the browser's "download PDFs" setting) */
async function renderPdfInto(url, host){
  host.innerHTML = '<div class="mat-loading">Loading preview…</div>';
  if(!window.pdfjsLib){
    host.innerHTML = '<div class="mat-loading">The PDF viewer didn\'t load (check your connection). The link below still opens the file.</div>';
    return;
  }
  try{
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await window.pdfjsLib.getDocument(url).promise;
    host.innerHTML = '';
    for(let n=1; n<=pdf.numPages; n++){
      const page = await pdf.getPage(n);
      const base = page.getViewport({scale:1});
      const scale = Math.min(2, (host.clientWidth - 28) / base.width);
      const vp = page.getViewport({scale});
      const canvas = document.createElement('canvas');
      canvas.width = vp.width; canvas.height = vp.height;
      host.appendChild(canvas);
      await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
    }
  }catch(e){
    host.innerHTML = '<div class="mat-loading">Couldn\'t render inline here. If you opened the file directly (file://), use VS Code Live Server or push to GitHub Pages. The link below opens the PDF either way.</div>';
  }
}

/* ---- TEACH ---- */
function renderTeach(){
  const c = stops[pos];
  show(`
    <div class="unitline">${MODULE.unit} &middot; ${PATH}</div>
    <h1 class="concept-title">${c.label}</h1>
    <span class="lo">${c.lo}</span>
    <p class="teach-body">${c.teach}</p>
    <button class="btn center" id="go">Check yourself</button>
  `);
  document.getElementById('go').onclick = ()=>{ attempts=0; lastWrong=null; renderCheck(false); };
}

/* ---- CHECK ----
   Same flow for EVERY question:
     wrong #1  -> reteach (misconception-specific video + open-source article)
     wrong #2  -> reteach again (same resources, "let's look once more")
     wrong #3+ -> no material; re-ask and keep trying until correct
   correct at any point -> recap. */
function renderCheck(isReask, hint){
  const c = stops[pos];
  const q = isReask ? c.check.reask : c.check;
  show(`
    <div class="eyebrow">${c.label}${isReask?' &middot; try again':''}</div>
    ${hint?`<p class="reveal-hint">${hint}</p>`:''}
    <p class="stem">${q.stem}</p>
    <div class="opts" id="opts">
      ${q.options.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></button>`).join('')}
    </div>
  `);
  document.querySelectorAll('#opts .opt').forEach(b=>{
    b.onclick = ()=>{
      const i=+b.dataset.i, opt=q.options[i];
      document.querySelectorAll('#opts .opt').forEach(x=>x.disabled=true);
      b.classList.add(opt.correct?'correct':'wrong');
      if(opt.correct){
        if(attempts===0 && !isReask) stats.firstTry++;
        setTimeout(renderRecap, 480);
        return;
      }
      attempts++;
      if(!isReask) lastWrong = opt;                 // first question carries the misconception media
      const reOpt = (!isReask) ? opt : (lastWrong || opt);
      if(attempts <= 2){
        stats.reteaches++;
        setTimeout(()=>renderReteach(reOpt, attempts), 520);
      } else {
        setTimeout(()=>renderCheck(true, "Not quite — give it another go. You've got this."), 650);
      }
    };
  });
}

/* ---- RETEACH (misconception-specific; inline media; no reflect) ---- */
function mediaHTML(opt){
  // video -> thumbnail that opens YouTube in a new tab (no embed, so never Error 153)
  let v;
  if(opt.video && opt.video.id){
    const id = opt.video.id;
    v = `<a class="ytthumb" href="https://www.youtube.com/watch?v=${id}" target="_blank" rel="noopener">
        <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="${opt.video.title}" loading="lazy">
        <span class="ytplay"><svg width="26" height="26" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#fff"/></svg></span>
        <span class="ytopen">Watch on YouTube &#8599;</span>
      </a>`;
  } else {
    v = `<div class="ytplaceholder">Paste a YouTube ID into <code>video.id</code> to show the video here.</div>`;
  }
  const vcard = `
    <div class="mcard vid open">
      <div class="mhead" data-toggle><span class="ic"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M5 3.5v9l7-4.5z" fill="#A8443A"/></svg></span>
        <span class="mt"><span class="mtitle">${opt.video?opt.video.title:'Video'}</span></span>
        <span class="chev">&#9660;</span></div>
      <div class="mbody">${v}</div>
    </div>`;
  const a = opt.article;
  const acard = a ? `
    <div class="mcard art open">
      <div class="mhead" data-toggle><span class="ic"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3.5" y="2.5" width="9" height="11" rx="1.4" stroke="#1e4895" stroke-width="1.4"/><path d="M5.5 6h5M5.5 8.3h5M5.5 10.6h3" stroke="#1e4895" stroke-width="1.2" stroke-linecap="round"/></svg></span>
        <span class="mt"><span class="mtitle">${a.title}</span></span>
        <span class="chev">&#9660;</span></div>
      <div class="mbody">
        <a class="artthumb" href="${a.url}" target="_blank" rel="noopener">
          <img src="https://s.wordpress.com/mshots/v1/${encodeURIComponent(a.url)}?w=640" alt="${a.title} preview" loading="lazy">
          <span class="ytopen">Open on OpenStax &#8599;</span>
        </a>
      </div>
    </div>` : '';
  return `<div class="media">${vcard}${acard}</div>`;
}
function renderReteach(opt, attemptNo){
  const c = stops[pos];
  const second = attemptNo >= 2;
  const head = second ? "let's look once more" : "let's untangle that";
  const cruxPanel = second
    ? `<div class="panel crux"><div class="tag">If the video didn't click, remember this</div><p>${c.recap}</p></div>`
    : '';
  show(`
    <div class="eyebrow">${c.label} &middot; ${head}</div>
    <div class="reteach">
      <div class="panel miss"><div class="tag">Common idea</div><p><b>${opt.mc}</b></p></div>
      ${cruxPanel}
      <div class="panel fix"><div class="tag">The fix</div><p>${opt.fix}</p></div>
      ${mediaHTML(opt)}
      <div class="actions"><button class="btn" id="retry">Try again &rarr;</button></div>
    </div>
  `);
  document.querySelectorAll('[data-toggle]').forEach(h=>{
    h.onclick = ()=>h.parentElement.classList.toggle('open');
  });
  document.getElementById('retry').onclick = ()=>{ renderCheck(true); };   // keep attempts; don't reset
}

/* (mastery/reveal step removed — retries now stay on the question until correct) */

/* ---- RECAP (+ one-line reflection, shown after correct) ---- */
function renderRecap(){
  const c = stops[pos];
  show(`
    <div class="eyebrow" style="color:var(--moss)">${c.label} &middot; nice</div>
    <div class="recap"><div class="tag">Worth remembering</div><p>${c.recap}</p></div>
    <div class="reflect-one"><label for="r1">${c.reflect}</label>
      <input id="r1" type="text" placeholder="Type a quick note to yourself…" autocomplete="off"></div>
    <button class="btn center" id="next">${pos < stops.length-1 ? 'Next concept &rarr;' : 'Finish unit &rarr;'}</button>
  `);
  document.getElementById('next').onclick = ()=>{
    const box = document.getElementById('r1');
    notes[c.label] = box ? box.value.trim() : '';
    pos++;
    if(pos < stops.length) renderTeach(); else renderWrap();
  };
}

/* ---- WRAP ---- */
function renderWrap(){
  show(`
    <div class="unitline">${MODULE.unit} &middot; ${PATH}</div>
    <div class="eyebrow">One last thing</div>
    <h2>Lock it in</h2>
    <div class="reflect-big"><textarea id="rb" placeholder="${MODULE.wrap.prompt}"></textarea></div>
    <div class="conf"><div class="clab">${MODULE.wrap.confLabel}</div>
      <div class="dots" id="confdots">${[1,2,3,4,5].map(n=>`<button class="cd" data-n="${n}">${n}</button>`).join('')}</div>
      <div class="cscale"><span>Still shaky</span><span>Solid</span></div></div>
    <button class="btn center" id="finish" disabled>See my unit recap</button>
  `, {prog:false});
  conf=0;
  document.querySelectorAll('#confdots .cd').forEach(b=>{
    b.onclick = ()=>{
      conf=+b.dataset.n;
      document.querySelectorAll('#confdots .cd').forEach(x=>x.classList.toggle('on', +x.dataset.n<=conf));
      document.getElementById('finish').disabled=false;
    };
  });
  document.getElementById('finish').onclick = ()=>{
    const box = document.getElementById('rb');
    finalReflection = box ? box.value.trim() : '';
    renderDone();
  };
}

/* ---- DONE ---- */
function renderDone(){
  show(`
    <div class="done">
      <div class="eyebrow" style="color:var(--moss)">Unit complete</div>
      <div class="big">Biodiversity, handled.</div>
      <p class="sub">You worked through the evolution and ecology concepts that show up most on the cumulative final — and caught the misconceptions that trip most people up.</p>
      <div class="done-stats">
        <div class="ds"><div class="n">${stats.firstTry}/${stops.length}</div><div class="l">right first try</div></div>
        <div class="ds"><div class="n">${stats.reteaches}</div><div class="l">reteaches used</div></div>
        <div class="ds"><div class="n">${conf}/5</div><div class="l">your confidence</div></div>
      </div>
      <div class="notes-block">
        <h3>Your notes</h3>
        ${stops.map(s=>{
          const n = notes[s.label];
          return `<div class="note-row"><span class="note-label">${s.label}</span><span class="note-val ${n?'':'none'}">${n?esc(n):'none'}</span></div>`;
        }).join('')}
        <div class="note-row"><span class="note-label">Final reflection</span><span class="note-val ${finalReflection?'':'none'}">${finalReflection?esc(finalReflection):'none'}</span></div>
      </div>
      <div class="actions">
        <button class="btn ghost" id="restart">Replay this unit</button>
        <button class="btn" id="nextunit">Next unit &rarr;</button>
      </div>
    </div>
  `, {prog:false});
  document.getElementById('restart').onclick = startPath;
  document.getElementById('nextunit').onclick = ()=>{
    const cur = (location.pathname.split('/').pop()||'').replace(/\.html$/,'');
    const idx = unitOrder.indexOf(cur);
    if(idx >= 0 && idx < unitOrder.length-1){
      location.href = unitOrder[idx+1] + '.html#' + PATH + '|' + unitOrder.join(',');
    } else {
      alert(unitOrder.length ? 'That was the last unit in your plan 🎉' : 'Next unit isn\'t wired yet — pass an ordered plan from onboarding.');
    }
  };
}

/* ---- path control ---- */
function startPath(){
  pos=0; attempts=0; conf=0; stats={firstTry:0, reteaches:0}; notes={}; finalReflection='';
  buildStops();
  renderMaterials();
}
document.querySelectorAll('#pathswitch button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('#pathswitch button').forEach(x=>x.classList.toggle('on', x===b));
    PATH=b.dataset.p; startPath();
  };
});

/* init */
buildStops();
// reflect incoming ?path in the switcher
document.querySelectorAll('#pathswitch button').forEach(b=>b.classList.toggle('on', b.dataset.p===PATH));
startPath();
